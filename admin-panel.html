<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云咖铺子 · 商家管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #2f2118; --primary-light: #5a3d2b; --primary-dark: #1a1109;
  --accent: #c8a26d; --accent-light: #e8d5b8; --accent-bg: #faf3eb;
  --bg: #f5f2ed; --card: #fff; --text: #2f2118; --text2: #666; --text3: #999;
  --border: #e8e0d6; --radius: 12px; --shadow: 0 2px 8px rgba(47,33,24,0.06);
  --success: #2e7d32; --warning: #e67e22; --danger: #c0392b;
  --sidebar: 240px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
body.sidebar-collapsed { --sidebar: 60px; }

/* Layout */
.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar); background: var(--primary); color: #fff;
  display: flex; flex-direction: column; transition: width .3s;
  position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
  overflow: hidden;
}
.sidebar-header {
  padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px; white-space: nowrap;
}
.sidebar-header .logo { font-size: 24px; }
.sidebar-header .title { font-size: 16px; font-weight: 700; }
.sidebar-header .sub { font-size: 11px; color: var(--accent); }
.sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  color: rgba(255,255,255,0.7); cursor: pointer; transition: all .2s;
  font-size: 14px; white-space: nowrap; border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,0.12); color: #fff; border-left-color: var(--accent); }
.nav-item .icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
.nav-item .label { overflow: hidden; text-overflow: ellipsis; }

/* Main */
.main {
  flex: 1; margin-left: var(--sidebar); transition: margin-left .3s;
  padding: 0; min-height: 100vh;
}
.topbar {
  background: var(--card); padding: 12px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar .toggle-sidebar {
  font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
  background: none; border: none; color: var(--text); 
}
.topbar .toggle-sidebar:hover { background: var(--bg); }
.topbar .page-title { font-size: 18px; font-weight: 600; }
.topbar .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text2); }

.content { padding: 24px; }

/* Page header */
.page-header { margin-bottom: 24px; }
.page-header h2 { font-size: 22px; font-weight: 700; }
.page-header p { font-size: 13px; color: var(--text3); margin-top: 4px; }

/* Search */
.search-bar { position: relative; margin-bottom: 20px; }
.search-bar input {
  width: 100%; padding: 10px 16px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 14px; background: var(--card);
  outline: none; transition: border .2s;
}
.search-bar input:focus { border-color: var(--accent); }

/* Cards */
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.card-body { padding: 20px; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 20px; text-align: center;
}
.stat-card .num { font-size: 32px; font-weight: 700; color: var(--primary); }
.stat-card .label { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* Menu Grid */
.menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
.menu-section { margin-bottom: 24px; }
.menu-section-title { font-size: 14px; font-weight: 600; color: var(--text3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.menu-card {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 20px; cursor: pointer; transition: all .2s; border: 1px solid transparent;
}
.menu-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(47,33,24,0.1); }
.menu-card .icon { font-size: 28px; display: block; margin-bottom: 8px; }
.menu-card .name { font-size: 15px; font-weight: 600; }
.menu-card .desc { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { font-weight: 600; color: var(--text3); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; background: var(--bg); }
tr:hover td { background: var(--accent-bg); }

/* Tags */
.tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.tag-sm { font-size: 10px; padding: 1px 8px; }
.tag-1 { background: #d4e6c3; color: #33691e; }
.tag-2 { background: #e3e0f3; color: #4a148c; }
.tag-3 { background: #fce4c8; color: #bf360c; }
.tag-active { background: #e8f5e9; color: #2e7d32; }
.tag-used { background: #f5f5f5; color: #999; }
.tag-expired { background: #fbe9e7; color: #bf360c; }
.tag-pending { background: #fff8e1; color: #f57f17; }
.tag-shipped { background: #e3f2fd; color: #1565c0; }
.tag-delivered { background: #e8f5e9; color: #2e7d32; }

/* Buttons */
.btn {
  padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: all .2s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); }
.btn-sm { padding: 4px 12px; font-size: 12px; border-radius: 6px; }
.btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
.btn-outline:hover { background: var(--primary); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: .8; }
.btn + .btn { margin-left: 8px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; outline: none; transition: border .2s;
  background: #fff;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent);
}
.form-group textarea { min-height: 80px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }

/* Member */
.member-detail { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 16px; }
.member-detail .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.member-detail .row:last-child { border: none; }
.member-detail .label { color: var(--text3); }
.member-detail .value { font-weight: 500; }

/* Tier */
.tier-card {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 24px; margin-bottom: 16px; border-left: 4px solid var(--accent);
}
.tier-card .header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.tier-card .name { font-size: 18px; font-weight: 700; }
.tier-card .level { font-size: 12px; color: var(--text3); background: var(--bg); padding: 2px 10px; border-radius: 20px; }
.tier-card .info { margin-bottom: 12px; }
.tier-card .info-row { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.tier-card .benefits { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.tier-card .benefit-tag { font-size: 12px; color: #555; background: var(--accent-bg); padding: 4px 12px; border-radius: 6px; }
.tier-card .btn-area { display: flex; gap: 8px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card); border-radius: 16px; padding: 32px;
  width: 90%; max-width: 760px; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal h3 { font-size: 18px; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

/* Toast */
.toast {
  position: fixed; top: 20px; right: 20px; z-index: 2000;
  padding: 12px 24px; border-radius: 10px; font-size: 14px;
  background: var(--primary); color: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  transform: translateX(120%); transition: transform .3s;
}
.toast.show { transform: translateX(0); }
.toast.success { background: #2e7d32; }
.toast.error { background: #c0392b; }

/* Benefits */
.benefit-item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); padding: 16px 20px; border-radius: var(--radius);
  margin-bottom: 8px; box-shadow: var(--shadow);
}
.benefit-item .left { flex: 1; }
.benefit-item .title { font-size: 14px; font-weight: 600; }
.benefit-item .meta { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* Setting sections */
.setting-section { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 16px; }
.setting-section .section-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .icon { font-size: 48px; display: block; margin-bottom: 12px; }
.empty-state .text { font-size: 14px; }

/* Charts */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
.chart-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.chart-card canvas { width: 100% !important; height: 220px !important; display: block; }
@media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }

/* Tracking */
.tracking-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all .2s; }
.tracking-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(47,33,24,0.08); }
.tracking-card .left { flex: 1; }
.tracking-card .num { font-size: 15px; font-weight: 600; }
.tracking-card .num .carrier { font-weight: 400; font-size: 12px; color: var(--text3); margin-left: 6px; }
.tracking-card .meta { font-size: 12px; color: var(--text3); margin-top: 4px; display: flex; gap: 16px; flex-wrap: wrap; }
.tracking-card .right { text-align: right; }
.tracking-card .time { font-size: 11px; color: var(--text3); margin-top: 4px; }
.timeline { padding: 8px 0; position: relative; }
.timeline-item { display: flex; gap: 16px; padding-bottom: 24px; position: relative; }
.timeline-item:last-child { padding-bottom: 0; }
.timeline-item::before { content: ''; position: absolute; left: 11px; top: 22px; bottom: 0; width: 2px; background: var(--border); }
.timeline-item:last-child::before { display: none; }
.timeline-dot { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; position: relative; z-index: 1; }
.timeline-dot.done { background: #2e7d32; color: #fff; }
.timeline-dot.current { background: #e67e22; color: #fff; }
.timeline-dot.pending { background: var(--border); color: var(--text3); }
.timeline-body { flex: 1; }
.timeline-body .desc { font-size: 13px; }
.timeline-body .time { font-size: 11px; color: var(--text3); margin-top: 2px; }
.tag-carrier { font-size: 11px; padding: 1px 8px; border-radius: 4px; background: #e3f2fd; color: #1565c0; }

/* Loading */
.loading { text-align: center; padding: 60px 20px; color: var(--text3); }
.loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .sidebar .title, .sidebar .sub, .sidebar .label { display: none; }
  .sidebar-header { padding: 16px 10px; justify-content: center; }
  .nav-item { justify-content: center; padding: 10px; }
  .main { margin-left: 60px; }
  .form-row { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr 1fr; }

  .content { padding: 16px; }
}

let currentPage = 'dashboard';

function filterByDateRange(items, field, from, to) {
  if (!items || items.length === 0) return [];
  return items.filter(i => {
    const d = i[field];
    if (!d) return false;
    return d >= from && d <= to;
  });
}

function monthInRange(monthIdx, from, to) {
  // monthIdx: 0=Jan, 1=Feb, ... 6=Jul
  // from/to format: '2026-01-01'
  const baseYear = 2026;
  const m = monthIdx + 1;
  const monthStart = `${baseYear}-${String(m).padStart(2,'0')}-01`;
  const lastDay = new Date(baseYear, m, 0).getDate();
  const monthEnd = `${baseYear}-${String(m).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  // Check if month range overlaps with [from, to]
  // A month is included if its end >= from AND its start <= to
  return monthEnd >= from && monthStart <= to;
}

function $(id) { return document.getElementById(id); }

function showToast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2500);
}

function openModal(html) {
  $('modalContent').innerHTML = html;
  $('modalOverlay').classList.add('show');
}
function closeModal() { $('modalOverlay').classList.remove('show'); }
$('modalOverlay').addEventListener('click', e => { if (e.target === $('modalOverlay')) closeModal(); });

function toggleSidebar() { document.body.classList.toggle('sidebar-collapsed'); }

function formatMoney(cents) { return (cents / 100).toFixed(2); }
function dateText(d) { return d || ''; }

function navigate(page) {
  const parts = page.split('?');
  const pageName = parts[0];
  const params = new URLSearchParams(parts[1] || '');
  currentPage = pageName;
  // 更新 URL hash 保留查询参数，让各页面渲染函数能读到
  if (parts[1]) {
    location.hash = '#' + parts[1];
  } else {
    // 切页面时清掉旧 hash（但保留页面名让 hashchange 不误触）
    location.hash = '';
  }
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === pageName);
  });

// ===== CHART RENDERER =====
function drawLineChart(canvasId, labels, datasets, colors) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width - 20;
  const H = 220;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const pad = { top: 20, right: 20, bottom: 36, left: 48 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  // Find data range
  let allVals = [];
  datasets.forEach(ds => allVals = allVals.concat(ds.data));
  const maxVal = Math.max(...allVals);
  const minVal = Math.min(0, ...allVals);
  const range = maxVal - minVal || 1;
  const ySteps = 4;
  const step = range / ySteps;

  // Background
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#f0ece6';
  ctx.lineWidth = 1;
  for (let i = 0; i <= ySteps; i++) {
    const y = pad.top + ch - (i / ySteps) * ch;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
    // Y label
    const val = Math.round(minVal + step * i);
    ctx.fillStyle = '#aaa';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(val, pad.left - 6, y + 4);
  }

  // X labels
  ctx.fillStyle = '#aaa';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  labels.forEach((l, i) => {
    const x = pad.left + (i / (labels.length - 1)) * cw;
    ctx.fillText(l, x, H - pad.bottom + 16);
  });

  // Draw lines
  datasets.forEach((ds, di) => {
    const color = colors[di % colors.length];
    const points = ds.data.map((v, i) => ({
      x: pad.left + (i / (ds.data.length - 1)) * cw,
      y: pad.top + ch - ((v - minVal) / range) * ch,
    }));

    // Fill area
    if (ds.fill !== false) {
      ctx.beginPath();
      ctx.moveTo(points[0].x, pad.top + ch);
      points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(points[points.length - 1].x, pad.top + ch);
      ctx.closePath();
      ctx.fillStyle = color + '18';
      ctx.fill();
    }

    // Line
    ctx.beginPath();
    points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Dots
    points.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
    });
  });

  // Legend
  if (datasets.length > 1) {
    const legendX = pad.left;
    const legendY = 4;
    datasets.forEach((ds, i) => {
      const cx = legendX + i * 160;
      ctx.fillStyle = colors[i % colors.length];
      ctx.fillRect(cx, legendY + 4, 12, 3);
      ctx.fillStyle = '#666';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(ds.label, cx + 16, legendY + 10);
    });
  }
}

function saveNewProduct() {
  const name = document.getElementById('npName')?.value.trim();
  if (!name) { showToast('请输入商品名称', 'error'); return; }
  // 自动生成商品编号：GB + 日期 + 序号
  const now = new Date();
  const dateStr = now.toISOString().slice(0,10).replace(/-/g, '');
  const seq = String(MOCK.products.length + 1).padStart(3, '0');
  const code = `GB-${dateStr}-${seq}`;
  const price = Number(document.getElementById('npPrice')?.value);
  if (!price) { showToast('请输入商品价格', 'error'); return; }

  // Collect selected coupons
  const couponCbs = document.querySelectorAll('input[name="npCoupon"]:checked');
  const coupons = Array.from(couponCbs).map(cb => cb.value);

  // File name for header image
  const fileInput = document.getElementById('npHeaderImage');
  const headerImageName = fileInput?.files?.[0]?.name || '';

  const newProduct = {
    id: Date.now(),
    name,
    code,
    price,
    stock: 999,
    sales: 0,
    status: '上架',
    image: document.getElementById('npLogo')?.value || '☕',
    category: '咖啡豆',
    memory: document.getElementById('npMemory')?.value || '',
    sortOrder: Number(document.getElementById('npSort')?.value || 0),
    minPurchaseQty: Number(document.getElementById('npMinQty')?.value || 1),
    maxPurchaseQty: document.getElementById('npMaxQty')?.value ? Number(document.getElementById('npMaxQty').value) : null,
    purchaseLimit: document.getElementById('npLimitPurchase')?.checked || false,
    showStock: document.getElementById('npShowStock')?.checked !== false,
    supportRefund: document.getElementById('npSupportRefund')?.checked !== false,
    effectiveDate: document.getElementById('npEffectiveDate')?.value || '',
    coupons,
    headerImage: headerImageName,
    details: document.getElementById('npDetails')?.value || '',
    purchaseNotes: document.getElementById('npPurchaseNotes')?.value || '',
    shareTitle: document.getElementById('npShareTitle')?.value || name,
    shareDesc: document.getElementById('npShareDesc')?.value || '',
  };

  MOCK.products.unshift(newProduct);
  closeModal();
  renderProducts();
  showToast(`✅ 商品「${name}」创建成功`, 'success');
}

function exportOrders() {
  const rows = MOCK.orders.map(o => [o.id, o.customer, o.items.join('、'), '¥' + o.total, o.status, o.source || '', o.date]);
  const header = ['订单号','客户','商品','金额','状态','来源','日期'];
  const csv = [header.join(','), ...rows.map(r => r.map(v => '"' + v + '"').join(','))].join('\\n');
  const blob = new Blob(['\\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '云咖铺子_订单导出_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('✅ 订单已导出', 'success');
}

function confirmIssueCoupon(memberId, couponCode, couponName, type, productName, productImage) {
  const coupon = MOCK.coupons.find(c => c.code === couponCode);
  if (!coupon) { showToast('卡券模板不存在', 'error'); return; }
  if (coupon.used >= coupon.total) { showToast('该卡券已发完', 'error'); return; }
  // 发放记录
  coupon.used++;
  const instanceCode = 'CPN-INST-' + String(MOCK.couponRecords.length + 1).padStart(3,'0');
  const member = MOCK.members.find(x => x.id === memberId);
  MOCK.couponRecords.push({
    id: 'R' + instanceCode, couponCode, couponName, instanceCode,
    issuedTo: member.nickname, phone: member.phone, memberId,
    issuedAt: new Date().toISOString().slice(0,16).replace('T',' '), status: 'active', redeemedAt: ''
  });
  // 会员券包
  MOCK.memberCoupons.push({
    instanceId: 'MC' + (MOCK.memberCoupons.length + 1),
    memberId, couponCode, couponName, type, productName, productImage,
    issuedAt: new Date().toISOString().slice(0,16).replace('T',' '),
    expireAt: coupon.validUntil || '2026-12-31', status: 'active', usedAt: ''
  });
  closeModal();
  showToast('✅ 已向 ' + member.nickname + ' 发放「' + couponName + '」', 'success');
}

function saveTier(idx) {
  const t = MOCK.tiers[idx];
  t.name = $('etName').value;
  t.conditions.registerFree = $('etFree').checked;
  if (!t.conditions.registerFree) {
    t.conditions.entryRequirements.totalSpendCents = Number($('etSpend').value || 0) * 100;

function formatCouponDiscount(c) {
  if (c.type === '折扣') {
    const rate = c.discount * 10;
    return (rate % 1 === 0 ? rate : rate.toFixed(1)) + '折';
  }
  if (c.type === '实物券') {
    return c.productName || '实物兑换';
  }
  // 满减
  return '满¥' + (c.minSpend / 100).toFixed(0) + '减¥' + c.discount;
}

function renderCouponRecordCard(r) {

function filterCouponRecords() {
  const phone = (document.getElementById('crPhone')?.value || '').trim().toLowerCase();
  const memberId = (document.getElementById('crMemberId')?.value || '').trim().toLowerCase();
  const tplCode = (document.getElementById('crTplCode')?.value || '').trim().toLowerCase();
  const instCode = (document.getElementById('crInstCode')?.value || '').trim().toLowerCase();

  let list = MOCK.couponRecords || [];
  if (phone) list = list.filter(r => (r.phone || '').toLowerCase().includes(phone));
  if (memberId) list = list.filter(r => (r.memberId || '').toLowerCase().includes(memberId));
  if (tplCode) list = list.filter(r => r.couponCode.toLowerCase().includes(tplCode));
  if (instCode) list = list.filter(r => (r.instanceCode || '').toLowerCase().includes(instCode));
  const statusFilter = document.getElementById('crStatusFilter')?.value || '';
  if (statusFilter) list = list.filter(r => r.status === statusFilter);

  const container = document.getElementById('couponRecordList');
  if (!container) return;

  container.innerHTML = list.length === 0
    ? '<div class="empty-state"><span class="icon">🔍</span><span class="text">未找到匹配记录</span></div>'
    : list.map(r => renderCouponRecordCard(r)).join('');
}

function saveNewCoupon() {
  const name = document.getElementById('ncName')?.value.trim();
  if (!name) { showToast('请输入卡券名称', 'error'); return; }
  const type = document.getElementById('ncType')?.value || '折扣';
  let discount, minSpend, total, productName, productImage, productDesc;
  if (type === '折扣') {
    discount = Number(document.getElementById('ncDiscountRate')?.value || 0.9);
    minSpend = 0;
    total = Number(document.getElementById('ncTotal')?.value || 0) || 9999;
  } else if (type === '满减') {
    discount = Number(document.getElementById('ncDiscountAmt')?.value || 0);
    minSpend = Number(document.getElementById('ncMinSpend')?.value || 50) * 100;
    total = Number(document.getElementById('ncTotal2')?.value || 0) || 9999;
  } else {
    // 实物券
    productName = document.getElementById('ncGiftName')?.value.trim();
    if (!productName) { showToast('请输入兑换商品名称', 'error'); return; }
    productImage = document.getElementById('ncGiftImage')?.value || '🎁';
    productDesc = document.getElementById('ncGiftDesc')?.value || '';
    discount = 0; minSpend = 0;
    total = Number(document.getElementById('ncGiftTotal')?.value || 0) || 9999;
  }
  const newCoupon = {
    id: Date.now(),
    code: document.getElementById('ncCode')?.value || `CPN-${Date.now()}`,
    name, type, discount, minSpend, total, used: 0,
    status: '进行中',
    validUntil: document.getElementById('ncValidUntil')?.value || '',
    productName, productImage, productDesc,
  };
  MOCK.coupons.unshift(newCoupon);
  closeModal();
  renderCoupons();
  showToast(`✅ 卡券「${name}」创建成功`, 'success');
}

function saveEditCoupon(id) {
  const c = MOCK.coupons.find(x => x.id === id);
  c.name = document.getElementById('ecName')?.value || c.name;

  if (c.type === '折扣') {

    c.discount = Number(document.getElementById('ecDiscountAmt')?.value || 0);

function deleteCoupon(id) {

function searchTracking() {
  const keyword = document.getElementById('trackSearchInput')?.value?.trim().toLowerCase() || '';
  const carrier = document.getElementById('trackCarrierFilter')?.value || '';
  let list = MOCK.tracking;
  if (keyword) list = list.filter(t => t.number.toLowerCase().includes(keyword) || t.receiver.includes(keyword));
  if (carrier) list = list.filter(t => t.carrier === carrier);

  function statusTag(s) {
    const m = { delivered: 'tag-active', shipping: 'tag-shipped', pending: 'tag-pending' };
    const l = { delivered: '已签收', shipping: '运输中', pending: '待揽收' };
    return `<span class="tag ${m[s] || ''}">${l[s] || s}</span>`;
  }

  document.getElementById('trackingList').innerHTML = list.length === 0
    ? '<div class="empty-state"><span class="icon">🔍</span><span class="text">未找到匹配的物流单</span></div>'
    : list.map(t => `
      <div class="tracking-card" onclick="showTrackingDetail('${t.id}')">
        <div class="left">
          <div class="num">${t.number} <span class="carrier">${t.carrier}</span></div>
          <div class="meta">
            <span>📤 ${t.sender}</span>
            <span>📥 ${t.receiver}</span>
            <span>📍 ${t.address}</span>
          </div>
        </div>
        <div class="right">
          <div>${statusTag(t.status)}</div>
          <div class="time">${t.updateTime}</div>
        </div>
      </div>
    `).join('');
}

function saveNewTracking() {
  const number = document.getElementById('atNumber')?.value.trim();
  if (!number) { showToast('请输入快递单号', 'error'); return; }
  const receiver = document.getElementById('atReceiver')?.value.trim();
  if (!receiver) { showToast('请输入收件人', 'error'); return; }

  const now = new Date();
  const timeStr = now.toISOString().slice(0, 16).replace('T', ' ');

  MOCK.tracking.unshift({
    id: 'T' + Date.now(),
    number,
    carrier: document.getElementById('atCarrier')?.value || '顺丰速运',
    status: 'pending',
    sender: document.getElementById('atSender')?.value || '云咖铺子总部',
    receiver,
    address: document.getElementById('atAddress')?.value || '',
    updateTime: timeStr,
    traces: [{ time: timeStr, desc: '已提交物流信息，等待快递员取件' }],
  });
  closeModal();
  renderTracking();
  showToast(`✅ 已添加物流单：${number}`, 'success');
}

function showTrackingDetail(id) {
  const t = MOCK.tracking.find(x => x.id === id);
  if (!t) return;
  function dotIcon(s, i, arr) {
    if (i === 0) return 'current';
    if (s.status === 'delivered' && i < arr.length - 1) return 'done';
    if (s.status === 'delivered') return 'done';
    if (s.status !== 'delivered' && s.status === 'pending' && i === 0) return 'pending';
    return 'done';
  }
  function dotText(i) {
    if (i === 0) return '●';
    return '●';
  }

  const statusLabel = t.status === 'delivered' ? '✅ 已签收' : t.status === 'shipping' ? '🚚 运输中' : '⏳ 待揽收';

  openModal(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="margin:0">📦 ${t.number}</h3>
      <span class="tag-carrier">${t.carrier}</span>

    <div class="member-detail" style="box-shadow:none;padding:0;margin-bottom:20px">
      <div class="row"><span class="label">发件方</span><span class="value">${t.sender}</span></div>

      ${t.traces.map((tr, i) => {
        const dotClass = i === 0 ? 'current' : 'done';

        return `

function showCreateQR() {
  openModal(`
    <h3>➕ 新建二维码</h3>
    <div class="form-group"><label>推广渠道名称</label><input id="qrName" placeholder="如：抖音推广、朋友圈广告" /></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="createQR()">创建</button>
    </div>
  `);
}

function createQR() {
  const name = $('qrName').value.trim();
  if (!name) { showToast('请输入推广渠道名称', 'error'); return; }
  qrCodeIdCounter++;
  MOCK.qrcodes.push({
    id: 'Q' + qrCodeIdCounter,
    name,
    scene: 'qr_' + name.replace(/\\s+/g, '').slice(0, 20),
    createdAt: new Date().toISOString().slice(0, 10),
    scanCount: 0,
    orderCount: 0
  });
  closeModal();
  renderQRCodes();
  showToast('✅ 二维码已创建', 'success');
}

function deleteQR(id) {
  if (!confirm('确定删除此二维码？')) return;
  MOCK.qrcodes = MOCK.qrcodes.filter(q => q.id !== id);
  renderQRCodes();
  showToast('已删除', 'success');
}

function downloadQR(scene, name) {
  const appid = MOCK.settings.wechat.appid;
  const baseUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=';
  const miniUrl = encodeURIComponent('weixin://dl/business/?appid=' + appid + '&path=pages%2Findex%2Findex%3Fscene%3D' + scene);
  const imgUrl = baseUrl + miniUrl;

  // 下载二维码图片
  const a = document.createElement('a');
  a.href = imgUrl;
  a.download = name + '_二维码.png';
  a.target = '_blank';
  a.click();
  showToast('✅ 二维码已下载（部署后端后可生成微信官方二维码）', 'success');
}

      <div class="section-title">🔄 积分抵扣规则</div>
      <div style="background:#f0f7ee;border:1px solid #c8e6c9;border-radius:8px;padding:14px 16px;margin-bottom:14px;font-size:13px;color:#2e7d32;display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">✅</span>
        <span><strong>已启用</strong> — 用户下单时自动按 <strong>10 积分 = 1 元</strong> 比例抵扣金额，同时扣减相应积分</span>
      </div>
      <div class="form-row">
        <div class="form-group"><label>积分抵扣比例</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input id="sPointsRatio" type="number" value="${s.pointsDeduction?.ratio || 10}" style="width:80px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none" />
            <span style="font-size:13px;color:var(--text2)">积分 = 1 元</span>
          </div>
        </div>
        <div class="form-group"><label>单笔抵扣上限（元）</label>
          <input id="sPointsMax" type="number" value="${s.pointsDeduction?.maxDiscountCents/100 || 20}" style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none" />
        </div>
      </div>
    </div>

    <div class="setting-section">
      <div class="section-title">🚚 运费设置</div>
      <div class="form-row">
        <div class="form-group"><label>运费（元）</label><input id="sFee" type="number" value="${s.shippingRule.feeCents / 100}" /></div>
        <div class="form-group"><label>包邮门槛（元）</label><input id="sFreeThreshold" type="number" value="${s.shippingRule.freeThresholdCents / 100}" /></div>
      </div>
    </div>

    <div class="setting-section">
      <div class="section-title">📞 客服信息</div>
      <div class="form-row">
        <div class="form-group"><label>电话</label><input id="sPhone" value="${s.support.phone}" /></div>
        <div class="form-group"><label>微信</label><input id="sWechat" value="${s.support.wechat}" /></div>
      </div>
    </div>

    <div class="setting-section">
      <div class="section-title">🔔 订阅模板 ID</div>
      <div class="form-group"><label>优惠券到账</label><input id="sTmplCoupon" value="${s.subscribeTemplates.couponArrived}" /></div>
      <div class="form-group"><label>复购提醒</label><input id="sTmplRepurchase" value="${s.subscribeTemplates.repurchaseReminder}" /></div>
      <div class="form-group"><label>积分变动</label><input id="sTmplPoints" value="${s.subscribeTemplates.pointsChange}" /></div>
    </div>

    <div class="setting-section">
      <div class="section-title">📱 微信配置（用于生成带参二维码）</div>
      <div class="form-row">
        <div class="form-group"><label>AppID</label><input id="sAppid" value="${s.wechat.appid}" readonly style="background:#f5f2ed" /></div>
        <div class="form-group"><label>AppSecret</label><input id="sAppsecret" type="password" value="${s.wechat.appsecret}" placeholder="输入 AppSecret" /></div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">AppID 已自动填写。AppSecret 请在微信公众平台 → 开发 → 基本配置中获取</div>
    </div>
  `;
}

function saveSettings() {
  const s = MOCK.settings;
  s.points.earnText = $('sEarnText').value;
  s.points.redeemText = $('sRedeemText').value;
  s.pointsDeduction = s.pointsDeduction || {};
  s.pointsDeduction.ratio = Number($('sPointsRatio')?.value || 10);
  s.pointsDeduction.maxDiscountCents = Number($('sPointsMax')?.value || 20) * 100;
  s.shippingRule.feeCents = Number($('sFee').value || 0) * 100;
  s.shippingRule.freeThresholdCents = Number($('sFreeThreshold').value || 0) * 100;
  s.support.phone = $('sPhone').value;
  s.support.wechat = $('sWechat').value;
  s.subscribeTemplates.couponArrived = $('sTmplCoupon').value;
  s.subscribeTemplates.repurchaseReminder = $('sTmplRepurchase').value;
  s.subscribeTemplates.pointsChange = $('sTmplPoints').value;
  s.wechat.appsecret = $('sAppsecret').value;
  showToast('✅ 系统设置已保存', 'success');
}

// ===== 积分商城 =====
let pointsMallIdCounter = MOCK.pointsMall.length;
let pointsMallFilter = '';

function renderPointsMall() {
  const list = MOCK.pointsMall;
  const totalProducts = list.length;
  const totalRedeemed = MOCK.pointsRedemptions.length;
  const activeProducts = list.filter(p => p.status === '上架').length;
  const totalPointsSpent = MOCK.pointsRedemptions.reduce((s, r) => s + r.points, 0);

  $('pageContent').innerHTML = `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><h2>🛍️ 积分商城</h2><p>管理积分兑换商品，查看兑换记录</p></div>
      <button class="btn btn-primary" onclick="showNewPointsProduct()">➕ 新增积分商品</button>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="num">${activeProducts}</div><div class="label">🛍️ 在售商品</div></div>
      <div class="stat-card"><div class="num">${totalRedeemed}</div><div class="label">📋 总兑换次数</div></div>
      <div class="stat-card"><div class="num" style="color:var(--warning)">${totalPointsSpent.toLocaleString()}</div><div class="label">⭐ 累计消耗积分</div></div>
      <div class="stat-card"><div class="num" style="color:var(--success)">${totalProducts - activeProducts}</div><div class="label">📦 已下架/已售罄</div></div>
    </div>

    <!-- 积分商品列表 -->
    <div class="card">
      <div class="card-header">🎁 积分商品（${list.length}）</div>
      <div class="card-body">
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
          ${['全部','饮品券','实物','周边'].map(c => `
            <button class="btn btn-sm ${(pointsMallFilter === c || (pointsMallFilter === '' && c === '全部')) ? 'btn-primary' : 'btn-outline'}"
              onclick="pointsMallFilter='${c === '全部' ? '' : c}';renderPointsMall()">${c}</button>
          `).join('')}
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th></th><th>商品名称</th><th>所需积分</th><th>库存</th><th>已兑换</th><th>每人限兑</th><th>分类</th><th>状态</th><th>操作</th>
            </tr></thead>
            <tbody>
              ${list.filter(p => !pointsMallFilter || p.category === pointsMallFilter).map(p => `
                <tr>
                  <td style="font-size:24px">${p.image}</td>
                  <td><strong>${p.name}</strong></td>
                  <td><strong style="color:var(--warning)">⭐ ${p.points.toLocaleString()}</strong></td>
                  <td style="color:${p.stock <= 10 ? 'var(--danger)' : 'inherit'}">${p.stock}</td>
                  <td>${p.redeemed}</td>
                  <td>${p.limitPerUser > 0 ? '限 ' + p.limitPerUser + ' 次' : '<span style="color:var(--text3)">不限</span>'}</td>
                  <td><span class="tag" style="background:var(--accent-bg);color:var(--primary)">${p.category}</span></td>
                  <td><span class="tag ${p.status === '上架' ? 'tag-active' : 'tag-expired'}">${p.status}</span></td>
                  <td>
                    <button class="btn btn-sm btn-outline" onclick="editPointsProduct('${p.id}')">编辑</button>
                    <button class="btn btn-sm ${p.status === '上架' ? 'btn-danger' : 'btn-primary'}" onclick="togglePointsProduct('${p.id}')">${p.status === '上架' ? '下架' : '上架'}</button>
                    <button class="btn btn-sm btn-danger" onclick="deletePointsProduct('${p.id}')" style="margin-left:4px">删除</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 兑换记录 -->
    <div class="card">
      <div class="card-header">📋 兑换记录（${MOCK.pointsRedemptions.length}）</div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead><tr><th>会员</th><th>手机号</th><th>兑换商品</th><th>消耗积分</th><th>时间</th><th>状态</th></tr></thead>
            <tbody>
              ${MOCK.pointsRedemptions.slice().reverse().map(r => `
                <tr>
                  <td><strong>${r.member}</strong></td>
                  <td style="color:var(--text3)">${r.phone}</td>
                  <td>${r.product}</td>
                  <td><strong style="color:var(--warning)">⭐ ${r.points}</strong></td>
                  <td style="color:var(--text3)">${r.date}</td>
                  <td><span class="tag ${r.status === '已完成' ? 'tag-active' : r.status === '已发货' ? 'tag-shipped' : 'tag-pending'}">${r.status}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

// 新增积分商品
function showNewPointsProduct() {
  openModal(`
    <h3 style="margin-bottom:8px">➕ 新增积分商品</h3>
    <p style="font-size:12px;color:var(--text3);margin-bottom:20px">设置积分兑换商品信息</p>
    <div class="form-row">
      <div class="form-group"><label>🏷️ 商品名称 *</label><input id="npmName" placeholder="如：免费饮品券" /></div>
      <div class="form-group"><label>⭐ 所需积分 *</label><input id="npmPoints" type="number" placeholder="如：500" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>📦 库存</label><input id="npmStock" type="number" value="100" /></div>
      <div class="form-group"><label>🔒 每人限兑</label>
        <input id="npmLimit" type="number" value="1" placeholder="0=不限" />
        <div style="font-size:11px;color:var(--text3);margin-top:2px">0 表示不限制，每人可多次兑换</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>📂 分类</label>
        <select id="npmCategory" style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff;width:100%">
          <option value="饮品券">饮品券</option>
          <option value="实物">实物</option>
          <option value="周边">周边</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>🎨 图标</label>
      <select id="npmImage" style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff;width:100%">
        <option value="☕">☕ 咖啡</option>
        <option value="🫘">🫘 咖啡豆</option>
        <option value="🥤">🥤 杯子</option>
        <option value="👜">👜 帆布袋</option>
        <option value="🎁">🎁 礼盒</option>
        <option value="🧪">🧪 新品</option>
        <option value="🌤️">🌤️ 拼配</option>
      </select>
    </div>
    <div class="form-group"><label>📝 商品描述</label><textarea id="npmDesc" rows="3" placeholder="兑换商品描述..." style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;resize:vertical"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveNewPointsProduct()">💾 保存</button>
    </div>
  `);
}

function saveNewPointsProduct() {
  const name = document.getElementById('npmName')?.value.trim();
  const points = Number(document.getElementById('npmPoints')?.value);
  if (!name) { showToast('请输入商品名称', 'error'); return; }
  if (!points || points < 1) { showToast('请输入有效积分值', 'error'); return; }
  pointsMallIdCounter++;
  MOCK.pointsMall.push({
    id: 'PM' + pointsMallIdCounter,
    name,
    points,
    stock: Number(document.getElementById('npmStock')?.value || 100),
    redeemed: 0,
    limitPerUser: Math.max(0, Number(document.getElementById('npmLimit')?.value || 0)),
    image: document.getElementById('npmImage')?.value || '🎁',
    desc: document.getElementById('npmDesc')?.value || '',
    status: '上架',
    createdAt: new Date().toISOString().slice(0,10),
    category: document.getElementById('npmCategory')?.value || '实物',
  });
  closeModal();
  renderPointsMall();
  showToast('✅ 积分商品「' + name + '」已创建', 'success');
}

function editPointsProduct(id) {
  const p = MOCK.pointsMall.find(x => x.id === id);
  if (!p) return;
  openModal(`
    <h3 style="margin-bottom:8px">编辑积分商品</h3>
    <p style="font-size:12px;color:var(--text3);margin-bottom:20px">${p.name}</p>
    <div class="form-row">
      <div class="form-group"><label>🏷️ 商品名称</label><input id="epmName" value="${p.name}" /></div>
      <div class="form-group"><label>⭐ 所需积分</label><input id="epmPoints" type="number" value="${p.points}" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>📦 库存</label><input id="epmStock" type="number" value="${p.stock}" /></div>
      <div class="form-group"><label>🔒 每人限兑</label>
        <input id="epmLimit" type="number" value="${p.limitPerUser || 0}" placeholder="0=不限" />
        <div style="font-size:11px;color:var(--text3);margin-top:2px">0 表示不限制，每人可多次兑换</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>📂 分类</label>
        <select id="epmCategory" style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff;width:100%">
          ${['饮品券','实物','周边'].map(c => `<option value="${c}" ${c === p.category ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group"><label>🎨 图标</label>
      <select id="epmImage" style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff;width:100%">
        ${['☕','🫘','🥤','👜','🎁','🧪','🌤️'].map(ico => `<option value="${ico}" ${ico === p.image ? 'selected' : ''}>${ico}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>📝 商品描述</label><textarea id="epmDesc" rows="3" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;resize:vertical">${p.desc}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEditPointsProduct('${id}')">💾 保存</button>
    </div>
  `);
}

function saveEditPointsProduct(id) {
  const p = MOCK.pointsMall.find(x => x.id === id);
  if (!p) return;
  p.name = document.getElementById('epmName')?.value || p.name;
  p.points = Number(document.getElementById('epmPoints')?.value || p.points);
  p.stock = Number(document.getElementById('epmStock')?.value || p.stock);
  p.limitPerUser = Math.max(0, Number(document.getElementById('epmLimit')?.value || 0));
  p.category = document.getElementById('epmCategory')?.value || p.category;
  p.image = document.getElementById('epmImage')?.value || p.image;
  p.desc = document.getElementById('epmDesc')?.value || p.desc;
  closeModal();
  renderPointsMall();
  showToast('✅ 积分商品已更新', 'success');
}

function togglePointsProduct(id) {
  const p = MOCK.pointsMall.find(x => x.id === id);
  if (!p) return;
  p.status = p.status === '上架' ? '下架' : '上架';
  renderPointsMall();
  showToast(p.status === '上架' ? '✅ 已上架' : '✅ 已下架', 'success');
}

function deletePointsProduct(id) {
  if (!confirm('确定删除此积分商品？')) return;
  MOCK.pointsMall = MOCK.pointsMall.filter(p => p.id !== id);
  renderPointsMall();
  showToast('✅ 已删除', 'success');
}

// ===== INIT =====
renderDashboard();
</script>
</body>
</html>
